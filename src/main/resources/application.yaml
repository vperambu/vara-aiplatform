spring:
  application:
    name: Vara AIPlatform
  cloud:
    gateway:
      routes:
        - id: aiplatform-orchestrator
          uri: lb://aiplatform-orchestrator
          predicates:
            - Path=/api/ai/**
          filters:
            - AuthFilter  # Custom filter for JWT validation
  datasource:
    url: jdbc:postgresql://localhost:5432/vara_aiplatform_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  # redis:
  #   host: localhost
  #   port: 6379

server:
  servlet:
    context-path: /vara-ai
  port: 8080
